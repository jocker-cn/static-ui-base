app:
  name: ui-base
  version: 0.0.1

# application.yml
apiBaseUrl: "https://api.default.com"

ui:
  sidebar:
    # 側邊欄頂部標題
    logoTitle: "🚀 UI 配置中枢"
    # 是否預設展開
    defaultOpen: true
    # 選單項目清單 (Array)
    items:
      - key: "dashboard"
        title: "📊 儀表盤"
        path: "/dashboard"

      - key: "settings"
        title: "⚙️ 全局設置"
        path: "/settings"

      - key: "forms"
        title: "📝 動態表單"
        path: "/forms"
        # 預留巢狀子選單的擴展能力
        children:
          - key: "form-create"
            title: "➕ 建立表單"
            path: "/forms/create"
          - key: "form-list"
            title: "📋 表單列表"
            path: "/forms/list"